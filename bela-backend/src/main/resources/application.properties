spring.config.import=optional:file:.env[.properties]

spring.application.name=bela-backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bela}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Add the driver explicitly to help Spring find it
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set the dialect to stop the guessing error
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# app options

app.jwt.secret=${JWT_SECRET:default_secret_1234567890_qwertyuiopasdfghjklzxcvbnm}
# 7 days in milliseconds (override via JWT_EXPIRATION_MS)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

app.internal-api-key=${INTERNAL_API_KEY}
app.frontend-domain=${FRONTEND_DOMAIN:http://localhost:3000}
app.backend-domain=${BACKEND_DOMAIN:http://localhost:8080}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# actuator: expose health for readiness/liveness probes
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never